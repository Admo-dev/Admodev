<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap');



.projects {
  display: flex;
  flex-direction: row;
  margin: auto;
  width: 80%;
  height: 80vh;
  justify-content: space-between;
  padding: 5rem 0 0 0;
  align-items:center;
  background: 
  radial-gradient(circle farthest-side at 50% 50%, rgba(98, 0, 255, 0.514)0%, rgba(0,0,0,0)20%),
  radial-gradient(circle closest-side at 57% 55%, rgb(71, 0, 0)0%, rgba(0,0,0,0)40%);
  
}

.projects .details h1 {
  display:inline-block;
  transition: all 0.3s ease;
  letter-spacing: 2px;
  font-size: 8rem;
  
}

.projects h2 {
  transition: all 0.3s ease;
  font-size: 1.5rem;
  
}

.projects .details {
  width: 50%;
  border-left: 1px solid var(--accent1);
  padding: 0 0 0 2rem;
  height: 80%;
  align-content:center;
  
}

.projects-container {
  margin: 10rem 0 0 0;
  flex: 1;
  height: 100%;
  justify-items: center;
  align-content:center;
}



.projects-box {
  position:absolute;
  
  border-radius: 0.5rem;
  transition: all 0.5s ease;
  text-align:center;
  width: 150px;
  height: 150px; 
  
}

.box1 {
  top:0;
}

.box2 {
  right:0;
}

.box3 {
  bottom:0;
}

.box4 {
  left:0;
}

.projects-box:hover h2 {
  color: rgba(255, 255, 255, 0.404);
}


.projects-box:hover{
  transform: scale(1.02);
}

.projects .con1 {
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  width:70%;
  height:70%;
 
}

.projects .item{
  width: 100%;
  height:100%;
}



.projects-box i {
  color: var(--accent1);
  font-size: 4rem;
}

.projects-content p {
  font-size: 1rem;
  text-shadow: 1px 1px 4px rgba(0, 0, 0, 1);
}

@media only screen and (min-width: 320px) and (max-width: 1000px) {

  .projects {
    height: 80vh;
    width:100vw;
    flex-direction:column-reverse;
    margin:0;
  }

  .projects .details h1 {
    font-size: 3rem;
  }

  .projects .details {
    width: 80%;
    margin:auto 0;
    border-left: none;
    border-bottom: 2px solid var(--accent1);
    padding: 0 0 0 0rem;
    height: 11%;
    text-align:center;
  
  }

  .projects .con1 {
    width: 100vw;
  }

  .projects-box {
    width: 120px;
    height: 120px; 
  
  }

  .projects-container {
     margin: 0 0 0 0;
  }
}

    </style>
</head>
<body>
    <section class="projects" id="projects">
    
    <div class="projects-container">

      <div class="con1 same">
        <div class="projects-box box1">
          <div class="item">
            <i class="fa-solid fa-code"></i>
            <h2>HTML | CSS</h2>
          </div>
        </div>

        <div class="projects-box box2">
          <div class="item">
            <i class="fa-solid fa-code"></i>
            <h2>HTML | CSS</h2>
          </div>
        </div>

        <div class="projects-box box3">
          <div class="item">
            <i class="fa-solid fa-code"></i>
            <h2>HTML | CSS</h2>
          </div>
        </div>

        <div class="projects-box box4">
          <div class="item">
            <i class="fa-solid fa-code"></i>
            <h2>HTML | CSS</h2>
          </div>
        </div>
      </div>
    </div>

    <div class="details">
      <h1>pro<span>jects</span></h1>
    </div>
  </section>
</body>
</html>
